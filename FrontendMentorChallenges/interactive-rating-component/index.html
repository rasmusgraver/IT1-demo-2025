<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Interactive rating component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="page1" class="container"> <!-- Rating state start -->
    <div class="stardiv">
      <img src="images/icon-star.svg" alt="">
    </div>

    <h2>How did we do?</h2>
    <p>
      Please let us know how we did with your support request. All feedback is appreciated
      to help us improve our offering!
    </p>

    <div class="rating">
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
    </div>

    <button>Submit</button>

  </div> <!-- Rating state end -->

  <div id="page2" class="container thankyou"> <!-- Thank you state start -->

    <img src="images/illustration-thank-you.svg" alt="">

    <p class="thankyou_rating">You selected <!-- Add rating here --> out of 5 </p>

    <h2> Thank you! </h2>
    <p> We appreciate you taking the time to give a rating. If you ever need more support,
      don’t hesitate to get in touch! </p>

  </div> <!-- Thank you state end -->


  <script src="script.js"></script>

</body>

</html>
