<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <i class="fa-solid fa-house"></i>
            <nav>
                <ul>
                    <li> <a href="#section1">Link 1 </a> </li>
                    <li> <a href="#section2">Link 2 </a> </li>
                    <li> <a href="https://www.vg.no/nyheter/i/wrrwpG/avgiftskuttet-paa-drivstoff-det-virker">Link 3 </a>
                    </li>
                </ul>
            </nav>
            <i class="fa-solid fa-bars"></i>
            <i class="fa-solid fa-x"></i>
        </div>
    </header>
    <section id="section1">
        <div class="container">
            <h1>Section 1</h1>
        </div>
    </section>
    <section id="section2">
        <div class="container">
            <h1>Section 2</h1>
        </div>
    </section>


    <script>
        const crossElm = document.querySelector(".fa-x")
        const burgerElm = document.querySelector(".fa-bars")
        const headerElm = document.querySelector("header")

        burgerElm.addEventListener("click", function () {
            headerElm.classList.add("active")
        })

        crossElm.addEventListener("click", function () {
            headerElm.classList.remove("active")
        })

    </script>
</body>

</html>
